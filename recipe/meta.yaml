{% set name = "jftools" %}
{% set version = "0.5.1" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/jftools-{{ version }}.tar.gz
  sha256: 15f14bb84b7823ede01ea5c142cfdbcb6250061d7bb5f22f64b8d8b2f8002621

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.10,<4
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=2.0
    - scipy >=1.13
    - numba >=0.60
    - numba-lapack >=0.1.2
    - nbformat >=5.10
    - ipython >=8.18
    - matplotlib-base >=3.8
    - qutip >=5.0

test:
  imports:
    - jftools
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://github.com/jfeist/jftools
  summary: Collection of small useful helper tools for Python by Johannes Feist.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jfeist
